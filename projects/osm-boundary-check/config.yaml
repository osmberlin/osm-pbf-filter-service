# The project id is THIS FOLDER's name (osm-boundary-check). There is no `name:`
# field, and the download file is always `latest.osm.pbf` — both are derived, so
# nothing here can drift out of sync.
#   -> served at <host>/extracts/osm-boundary-check/latest.osm.pbf

description: Administrative boundaries for Germany.
repository: https://github.com/example-org/osm-boundary-check   # this project's source repo
homepage: https://osm-boundary-check.example.org               # public URL of the project
contact: example_osm_user                                       # OSM username to reach out to

area:
  region: germany

# Keep administrative boundary relations/ways and anything carrying admin_level.
filters:
  - nwr/boundary=administrative
  - nwr/admin_level

osmium:
  extract_strategy: complete_ways
  add_referenced: true
