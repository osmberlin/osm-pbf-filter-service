name: osm-boundary-check
description: Administrative boundaries for Germany.

area:
  region: germany

# Keep administrative boundary relations/ways and anything carrying admin_level.
filters:
  - nwr/boundary=administrative
  - nwr/admin_level

osmium:
  extract_strategy: complete_ways
  add_referenced: true
# output.filename defaults to latest.osm.pbf
#   -> served at <host>/extracts/osm-boundary-check/latest.osm.pbf
