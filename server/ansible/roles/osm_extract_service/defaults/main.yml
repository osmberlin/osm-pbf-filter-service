---
# Variables for the osm_extract_service role. Override per inventory/host.

# Where the planet + working files + served extracts live.
osm_root: /srv/osm

# Unprivileged user the GitHub Actions runner and the pipeline run as.
osm_runner_user: osmrunner
osm_runner_home: "/home/{{ osm_runner_user }}"

# Pinned Bun version (orchestrator runtime). Bump deliberately.
osm_bun_version: "1.3.13"

# Public hostname for the download server (nginx server_name).
osm_download_hostname: osm.example.org

# pyosmium virtualenv location (provides pyosmium-up-to-date).
osm_pyosmium_venv: /opt/pyosmium

# System packages installed via apt.
osm_system_packages:
  - osmium-tool
  - nginx
  - git
  - jq
  - curl
  - ca-certificates
  - python3
  - python3-venv
  - python3-pip
