---
# One-time provisioning for the osm-pbf-filter-service (PLAN.md Part A).
# After this runs, the GitHub Actions runner does everything else — except the
# interactive runner registration, which stays manual (see the role README).

- name: Install system packages
  ansible.builtin.apt:
    name: "{{ osm_system_packages }}"
    state: present
    update_cache: true

- name: Create pyosmium virtualenv (provides pyosmium-up-to-date)
  ansible.builtin.pip:
    name: osmium
    virtualenv: "{{ osm_pyosmium_venv }}"
    virtualenv_command: python3 -m venv
    state: present

- name: Link pyosmium-up-to-date onto PATH
  ansible.builtin.file:
    src: "{{ osm_pyosmium_venv }}/bin/pyosmium-up-to-date"
    dest: /usr/local/bin/pyosmium-up-to-date
    state: link

- name: Create the unprivileged runner user
  ansible.builtin.user:
    name: "{{ osm_runner_user }}"
    home: "{{ osm_runner_home }}"
    system: true
    create_home: true
    shell: /bin/bash

- name: Create data directories
  ansible.builtin.file:
    path: "{{ osm_root }}/{{ item }}"
    state: directory
    owner: "{{ osm_runner_user }}"
    group: "{{ osm_runner_user }}"
    mode: "0755"   # dirs world-readable so nginx (www-data) can serve them
  loop:
    - planet
    - work
    - extracts

# Pinned Bun, installed as the runner user. `creates:` keeps this idempotent.
# Supply-chain note: review https://bun.sh/install (or vendor a checksum-verified
# tarball) before trusting it on the shared server.
- name: Install pinned Bun (as the runner user)
  ansible.builtin.shell: "curl -fsSL https://bun.sh/install | bash -s -- bun-v{{ osm_bun_version }}"
  args:
    creates: "{{ osm_runner_home }}/.bun/bin/bun"
  become: true
  become_user: "{{ osm_runner_user }}"

- name: Install the nginx site for the extracts
  ansible.builtin.template:
    src: nginx-osm-extracts.conf.j2
    dest: /etc/nginx/sites-available/osm-extracts.conf
    mode: "0644"
  notify: Reload nginx

- name: Enable the nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/osm-extracts.conf
    dest: /etc/nginx/sites-enabled/osm-extracts.conf
    state: link
  notify: Reload nginx
