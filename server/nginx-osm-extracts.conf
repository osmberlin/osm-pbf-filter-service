# DRAFT — nginx site for serving OSM extracts (PLAN.md §A5).
# Static file serving from /srv/osm/extracts. Adjust server_name + TLS.
#
# TLS: obtain a cert (e.g. certbot --nginx -d osm.example.org). The block below
# shows the HTTPS server; certbot can also manage the listen/ssl_* lines for you.

server {
    listen 80;
    server_name osm.example.org;
    # Redirect everything to HTTPS once a cert exists:
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name osm.example.org;

    # ssl_certificate     /etc/letsencrypt/live/osm.example.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/osm.example.org/privkey.pem;

    root /srv/osm/extracts;
    autoindex off;

    # .pbf as a binary download; .json inline.
    types {
        application/json json;
    }
    default_type application/octet-stream;

    location / {
        add_header Accept-Ranges bytes;          # resumable large downloads
        add_header Cache-Control "public, max-age=3600";
        # Last-Modified is emitted automatically from the file mtime (= extract time).
        # The authoritative data-age info lives in the sibling status.json.
        # (Optional custom X-OSM-* headers would be added here — PLAN.md §B5.)
        try_files $uri =404;
    }
}
